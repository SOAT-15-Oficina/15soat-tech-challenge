apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: workshop
  labels:
    app.kubernetes.io/name: oficina-mecanica
    app.kubernetes.io/component: database
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: workshop
  labels:
    app.kubernetes.io/name: oficina-mecanica
    app.kubernetes.io/component: mail
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oficina-mecanica
      app.kubernetes.io/component: mail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oficina-mecanica
        app.kubernetes.io/component: mail
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:latest
          ports:
            - containerPort: 1025
              name: smtp
            - containerPort: 8025
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
