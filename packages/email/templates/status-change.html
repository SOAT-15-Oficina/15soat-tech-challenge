<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atualização da Ordem de Serviço</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f7;
      font-family: Arial, Helvetica, sans-serif;
      color: #333333;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f4f7; padding: 24px 0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            "
          >
            <tr>
              <td
                style="
                  background-color: #1f2937;
                  padding: 24px;
                  text-align: center;
                "
              >
                <h1 style="margin: 0; color: #ffffff; font-size: 22px">
                  Atualização da sua ordem de serviço
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px">
                <p style="margin: 0 0 16px 0; font-size: 16px">
                  Olá, <strong>{{.CustomerName}}</strong>,
                </p>
                <p
                  style="margin: 0 0 16px 0; font-size: 15px; line-height: 1.5"
                >
                  {{.Message}}
                </p>
                <table
                  role="presentation"
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  style="margin: 24px 0"
                >
                  <tr>
                    <td
                      style="
                        background-color: #f9fafb;
                        border: 1px solid #e5e7eb;
                        border-radius: 6px;
                        padding: 20px;
                      "
                    >
                      <p style="margin: 0 0 8px 0; font-size: 14px">
                        <strong>Código da OS:</strong> {{.WorkOrderCode}}
                      </p>
                      <p style="margin: 0 0 8px 0; font-size: 14px">
                        <strong>Status anterior:</strong>
                        {{.PreviousStatusLabel}}
                      </p>
                      <p style="margin: 0; font-size: 14px">
                        <strong>Novo status:</strong> {{.NewStatusLabel}}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td
                style="
                  background-color: #f9fafb;
                  padding: 16px 32px;
                  text-align: center;
                  font-size: 12px;
                  color: #9ca3af;
                  border-top: 1px solid #e5e7eb;
                "
              >
                Este é um e-mail automático, por favor não responda.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
