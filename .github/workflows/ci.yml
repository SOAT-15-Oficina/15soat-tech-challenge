name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: techchallenge/api
  KIND_CLUSTER_NAME: techchallenge-local
  KUBE_NAMESPACE: workshop

concurrency:
  group: local-kind-deploy
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        run: docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo rhysd/actionlint:latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate OpenAPI contract
        run: npx --yes @redocly/cli@1.34.5 lint workshop --config redocly.yaml

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: techchallenge
          POSTGRES_PASSWORD: password
          POSTGRES_DB: techchallenge-db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techchallenge -d techchallenge-db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test ./...
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: techchallenge
          DATABASE_PASSWORD: password
          DATABASE_NAME: techchallenge-db

  build-and-deploy:
    runs-on: [self-hosted, local-kind]
    needs: [lint, test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build application
        run: go build ./...

      - name: Build Docker image locally
        run: |
          docker build \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:latest" \
            .

      - name: Check local Kubernetes context
        run: |
          KUBECONFIG_PATH="$RUNNER_TEMP/techchallenge-local-kubeconfig"
          echo "KUBECONFIG=$KUBECONFIG_PATH" >> "$GITHUB_ENV"

          kind get clusters | grep -Fx "$KIND_CLUSTER_NAME"
          kind get kubeconfig --name "$KIND_CLUSTER_NAME" > "$KUBECONFIG_PATH"
          kubectl --kubeconfig "$KUBECONFIG_PATH" cluster-info

      - name: Load Docker image into Kind
        run: kind load docker-image "${IMAGE_NAME}:${GITHUB_SHA}" --name "$KIND_CLUSTER_NAME"

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/metrics-server.yaml
          kubectl rollout status deployment/metrics-server -n kube-system --timeout=180s
          kubectl wait --for=condition=Available apiservice/v1beta1.metrics.k8s.io --timeout=180s
          for _ in $(seq 1 36); do
            if kubectl top nodes >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          kubectl top nodes

          # Namespace, ConfigMap, Secret, PVC, Deployment e Service do PostgreSQL
          # sao provisionados pelo Terraform em /infra (terraform apply no runner).
          # O CI apenas valida que a camada de dados ja existe antes do deploy da app.
          kubectl get namespace "$KUBE_NAMESPACE"
          kubectl rollout status deployment/postgres -n "$KUBE_NAMESPACE" --timeout=180s
          # shellcheck disable=SC2016
          kubectl exec deployment/postgres -n "$KUBE_NAMESPACE" -- sh -c '
            until pg_isready -U "$POSTGRES_USER" -d postgres; do
              sleep 2
            done

            if ! psql -U "$POSTGRES_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '\''$POSTGRES_DB'\''" | grep -q 1; then
              createdb -U "$POSTGRES_USER" "$POSTGRES_DB"
            fi
          '

          kubectl apply -f k8s/mailhog-service.yaml
          kubectl apply -f k8s/mailhog-deployment.yaml
          kubectl apply -f k8s/api-service.yaml
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/api-hpa.yaml
          kubectl set image deployment/api api="${IMAGE_NAME}:${GITHUB_SHA}" -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/api -n "$KUBE_NAMESPACE" --timeout=180s

          # Keep the read-only HPA scenario reproducible without duplicating seed data.
          # shellcheck disable=SC2016
          if ! kubectl exec deployment/postgres -n "$KUBE_NAMESPACE" -- sh -c '
            psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc \
              "SELECT 1 FROM work_orders WHERE code = '\''OS-2026-0001'\''"
          ' | grep -q 1; then
            # shellcheck disable=SC2016
            kubectl exec -i deployment/postgres -n "$KUBE_NAMESPACE" -- sh -c '
              psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            ' < database/seed-files/seed.sql
          fi

      - name: Validate API health
        run: |
          kubectl port-forward svc/api-service 18080:8080 -n "$KUBE_NAMESPACE" &
          PORT_FORWARD_PID=$!
          trap 'kill "$PORT_FORWARD_PID" 2>/dev/null || true' EXIT

          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18080/ready >/dev/null; then
              break
            fi
            sleep 2
          done

          curl --fail --silent http://127.0.0.1:18080/ping | grep -Fx Pong
          curl --fail --silent http://127.0.0.1:18080/ready >/dev/null
          curl --fail --silent http://127.0.0.1:18080/swagger | grep -F 'url: "/docs/swagger.yaml"'
          curl --fail --silent http://127.0.0.1:18080/docs/swagger.yaml > "$RUNNER_TEMP/swagger.yaml"
          cmp docs/swagger.yaml "$RUNNER_TEMP/swagger.yaml"
