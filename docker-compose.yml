services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      - POSTGRES_USER=techchallenge
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=techchallenge-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techchallenge -d techchallenge-db"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
