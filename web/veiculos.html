<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oficina - Veículos</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-gray-900 text-white flex-shrink-0 flex flex-col"></aside>
    <div class="flex-1 flex flex-col">
      <header id="header" class="bg-white shadow px-6 py-3 flex justify-between items-center"></header>
      <main class="flex-1 p-6">

        <div class="flex items-center justify-between mb-6">
          <div></div>
          <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">Novo veículo</button>
        </div>

        <div class="bg-white rounded-xl shadow overflow-x-auto">
          <table class="w-full min-w-[720px] text-sm">
            <thead class="bg-gray-50 text-left text-gray-600">
              <tr>
                <th class="px-4 py-3 font-medium">Placa</th>
                <th class="px-4 py-3 font-medium">Marca</th>
                <th class="px-4 py-3 font-medium">Modelo</th>
                <th class="px-4 py-3 font-medium text-right">Ano</th>
                <th class="px-4 py-3 font-medium">Criado em</th>
                <th class="px-4 py-3 font-medium text-right">Ações</th>
              </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
          </table>
          <div id="empty" class="hidden text-center py-8 text-gray-400 text-sm">Nenhum veículo encontrado</div>
        </div>

      </main>
    </div>
  </div>

  <script src="/web/shared/app.js"></script>
  <script>
    initLayout();
    setPageTitle('Veículos');

    let customers = [];
    let currentVehicles = [];

    async function loadCustomers() {
      try {
        const resp = await api.get('/customers');
        const data = await api.json(resp);
        customers = data.data || [];
      } catch (e) { /* ignore */ }
    }

    async function loadVehicles() {
      try {
        const resp = await api.get('/vehicles');
        const data = await api.json(resp);
        const list = data.data || [];
        currentVehicles = list;
        const tbody = document.getElementById('table-body');
        const empty = document.getElementById('empty');
        if (list.length === 0) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden');
        tbody.innerHTML = list.map(v => `
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-3 align-middle font-mono font-medium">${escapeHtml(v.licensePlate)}</td>
            <td class="px-4 py-3 align-middle">${escapeHtml(v.brand)}</td>
            <td class="px-4 py-3 align-middle">${escapeHtml(v.model)}</td>
            <td class="px-4 py-3 align-middle text-right">${escapeHtml(v.year)}</td>
            <td class="px-4 py-3 align-middle text-gray-500">${formatDate(v.createdAt)}</td>
            <td class="px-4 py-3 align-middle text-right">
              <div class="flex justify-end gap-2">
                <button onclick="openEditModal('${v.id}')" class="bg-gray-200 hover:bg-gray-300 px-3 py-1.5 rounded-lg text-xs font-medium">Editar</button>
                <button onclick="deleteVehicle('${v.id}')" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-lg text-xs font-medium">Excluir</button>
              </div>
            </td>
          </tr>`).join('');
      } catch (e) { showError(e.message); }
    }

    function openCreateModal() {
      const opts = customers.map(c => `<option value="${c.id}">${c.name} (${c.document})</option>`).join('');
      openModal('Novo veículo', `
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Cliente</label>
            <select id="m-customer" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
              <option value="">Selecione...</option>${opts}
            </select>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Placa</label>
              <input id="m-plate" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="ABC1D23">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Ano</label>
              <input id="m-year" type="number" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" value="2024">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Marca</label>
              <input id="m-brand" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Modelo</label>
              <input id="m-model" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <button onclick="createVehicle()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm">Cadastrar</button>
        </div>`);
    }

    function openEditModal(id) {
      const vehicle = currentVehicles.find(v => v.id === id);
      if (!vehicle) return showError('Veículo não encontrado na listagem');

      const opts = customers.map(c => `
        <option value="${c.id}" ${c.id === vehicle.customerId ? 'selected' : ''}>${escapeHtml(c.name)} (${escapeHtml(c.document)})</option>
      `).join('');

      openModal('Editar veículo', `
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Cliente</label>
            <select id="m-customer" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
              <option value="">Selecione...</option>${opts}
            </select>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Placa</label>
              <input id="m-plate" type="text" value="${escapeAttr(vehicle.licensePlate)}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="ABC1D23">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Ano</label>
              <input id="m-year" type="number" value="${escapeAttr(vehicle.year)}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Marca</label>
              <input id="m-brand" type="text" value="${escapeAttr(vehicle.brand)}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Modelo</label>
              <input id="m-model" type="text" value="${escapeAttr(vehicle.model)}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <button onclick="updateVehicle('${vehicle.id}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm">Salvar alterações</button>
        </div>`);
    }

    async function createVehicle() {
      try {
        const resp = await api.post('/vehicles', {
          customerId: document.getElementById('m-customer').value,
          licensePlate: document.getElementById('m-plate').value,
          brand: document.getElementById('m-brand').value,
          model: document.getElementById('m-model').value,
          year: parseInt(document.getElementById('m-year').value),
        });
        await api.json(resp);
        closeModal();
        showToast('Veículo cadastrado');
        loadVehicles();
      } catch (e) { showError(e.message); }
    }

    async function updateVehicle(id) {
      try {
        const resp = await api.put('/vehicles/' + id, {
          customerId: document.getElementById('m-customer').value,
          licensePlate: document.getElementById('m-plate').value,
          brand: document.getElementById('m-brand').value,
          model: document.getElementById('m-model').value,
          year: parseInt(document.getElementById('m-year').value),
        });
        await api.json(resp);
        closeModal();
        showToast('Veículo atualizado');
        loadVehicles();
      } catch (e) { showError(e.message); }
    }

    async function deleteVehicle(id) {
      if (!confirm('Tem certeza de que deseja excluir este veículo?')) return;
      try {
        const resp = await api.del('/vehicles/' + id);
        await api.ensureOk(resp);
        showToast('Veículo excluído');
        loadVehicles();
      } catch (e) { showError(e.message); }
    }

    loadCustomers().then(() => loadVehicles());
  </script>
</body>
</html>
