<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oficina - Painel</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="/web/shared/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-gray-900 text-white flex-shrink-0 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="header" class="bg-white shadow px-6 py-3 flex justify-between items-center"></header>
      <main class="flex-1 p-6 overflow-hidden">
        <div id="board" class="kanban-board h-full"></div>
      </main>
    </div>
  </div>

  <script src="/web/shared/app.js"></script>
  <script>
    initLayout();
    setPageTitle('Painel');

    async function loadBoard() {
      const board = document.getElementById('board');
      board.innerHTML = STATUS_ORDER.map(status => {
        const m = STATUS_META[status];
        return `
          <div class="kanban-col flex flex-col">
            <div class="flex items-center gap-2 mb-3">
              <span class="inline-block px-2 py-0.5 text-xs font-semibold rounded ${m.bg} ${m.text}">${m.label}</span>
              <span class="text-xs text-gray-400" id="count-${status}">0</span>
            </div>
            <div id="col-${status}" class="flex-1 space-y-2 min-h-[200px]"></div>
          </div>`;
      }).join('');

      try {
        const resp = await api.get('/work-orders?limit=100');
        const data = await api.json(resp);
        const orders = data.data || [];

        const counts = {};
        STATUS_ORDER.forEach(s => counts[s] = 0);

        orders.forEach(wo => {
          const col = document.getElementById('col-' + wo.status);
          if (!col) return;
          counts[wo.status] = (counts[wo.status] || 0) + 1;

          const customer = wo.customer?.name || '';
          const vehicle = wo.vehicle ? `${wo.vehicle.brand} ${wo.vehicle.model}` : '';

          col.insertAdjacentHTML('beforeend', `
            <a href="/web/os.html?id=${wo.id}" class="wo-card block bg-white rounded-lg p-3 border border-gray-200">
              <div class="flex items-center justify-between mb-1">
                <span class="text-xs font-mono text-gray-500">${wo.code}</span>
              </div>
              <p class="text-sm font-medium text-gray-800 truncate">${wo.title}</p>
              <p class="text-xs text-gray-500 mt-1 truncate">${customer}</p>
              <p class="text-xs text-gray-400 truncate">${vehicle}</p>
            </a>`);
        });

        // Also load CANCELADA orders
        const cancelResp = await api.get('/work-orders?limit=100&status=CANCELADA');
        const cancelData = await api.json(cancelResp);
        const cancelOrders = cancelData.data || [];

        STATUS_ORDER.forEach(s => {
          const el = document.getElementById('count-' + s);
          if (el) el.textContent = counts[s] || 0;
        });

      } catch (e) { showError('Erro ao carregar o painel: ' + e.message); }
    }

    loadBoard();
  </script>
</body>
</html>
