<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oficina - Aprovacao de Orcamento</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Public page — no sidebar, no auth -->
  <div class="max-w-2xl mx-auto py-10 px-4">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Oficina</h1>
      <p class="text-gray-500 text-sm">Aprovacao de Orcamento</p>
    </div>

    <!-- Lookup form -->
    <div id="lookup" class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4">Consultar Ordem de Servico</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Codigo da OS</label>
          <input id="code" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Ex: OS-20260507-A1B2">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Documento (CPF/CNPJ)</label>
          <input id="document" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Somente numeros">
        </div>
        <div id="lookup-error" class="text-red-600 text-sm hidden"></div>
        <button onclick="lookupWO()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg text-sm">Consultar</button>
      </div>
    </div>

    <!-- Work order detail (hidden until lookup) -->
    <div id="detail" class="hidden">
      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h2 class="text-lg font-bold" id="wo-code"></h2>
            <div id="wo-status" class="mt-1"></div>
          </div>
          <div class="text-right">
            <p class="text-sm text-gray-500">Total Estimado</p>
            <p class="text-xl font-bold text-gray-800" id="wo-total"></p>
          </div>
        </div>

        <div class="flex flex-wrap gap-4 text-xs text-gray-500 pt-3 border-t" id="wo-dates"></div>
      </div>

      <!-- Services list -->
      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <h3 class="text-lg font-semibold mb-4">Servicos</h3>
        <div id="services-list" class="space-y-3"></div>
      </div>

      <!-- Bulk actions -->
      <div id="bulk-actions" class="hidden">
        <div class="flex gap-3">
          <button onclick="approveAll()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-lg text-sm">
            Aprovar Todos
          </button>
          <button onclick="rejectAll()" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-medium py-3 rounded-lg text-sm">
            Reprovar Todos
          </button>
        </div>
      </div>

      <div id="status-message" class="hidden mt-6 text-center p-4 rounded-lg"></div>
    </div>
  </div>

  <script>
    // Minimal standalone JS — no app.js dependency for public page
    const params = new URLSearchParams(window.location.search);
    const preCode = params.get('code') || '';
    const preDoc = params.get('document') || '';

    if (preCode) document.getElementById('code').value = preCode;
    if (preDoc) document.getElementById('document').value = preDoc;

    let woData = null;
    let woId = null;

    function formatCents(c) { return 'R$ ' + (c / 100).toFixed(2).replace('.', ','); }
    function formatDate(d) { return d ? new Date(d).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }) : ''; }

    const STATUS_LABELS = {
      RECEBIDA: 'Recebida', EM_DIAGNOSTICO: 'Em Diagnostico', AGUARDANDO_APROVACAO: 'Aguardando Aprovacao',
      APROVADO: 'Aprovado', EM_EXECUCAO: 'Em Execucao', FINALIZADA: 'Finalizada', ENTREGUE: 'Entregue', CANCELADA: 'Cancelada'
    };

    async function lookupWO() {
      const code = document.getElementById('code').value.trim();
      const doc = document.getElementById('document').value.trim();
      const errEl = document.getElementById('lookup-error');
      errEl.classList.add('hidden');

      if (!code || !doc) { errEl.textContent = 'Preencha codigo e documento'; errEl.classList.remove('hidden'); return; }

      try {
        const resp = await fetch(`/public/work-orders/${code}?document=${doc}`);
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.error || 'OS nao encontrada');
        }
        woData = await resp.json();

        // We need the work order ID for approval actions.
        // The public endpoint doesn't return ID, so we extract from the services approval flow.
        // We'll need to look up work orders by code; for now we use the code for display.

        document.getElementById('lookup').classList.add('hidden');
        document.getElementById('detail').classList.remove('hidden');
        renderDetail();
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }

    function renderDetail() {
      const d = woData;
      document.getElementById('wo-code').textContent = d.code;
      document.getElementById('wo-status').innerHTML =
        `<span class="inline-block px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">${STATUS_LABELS[d.status] || d.status}</span>`;
      document.getElementById('wo-total').textContent = formatCents(d.total_estimated_price_cents);

      const dates = [];
      if (d.received_at) dates.push('Recebida: ' + formatDate(d.received_at));
      if (d.quote_sent_at) dates.push('Orcamento: ' + formatDate(d.quote_sent_at));
      if (d.approved_at) dates.push('Aprovada: ' + formatDate(d.approved_at));
      if (d.started_at) dates.push('Iniciada: ' + formatDate(d.started_at));
      if (d.finished_at) dates.push('Finalizada: ' + formatDate(d.finished_at));
      if (d.delivered_at) dates.push('Entregue: ' + formatDate(d.delivered_at));
      document.getElementById('wo-dates').innerHTML = dates.map(t => `<span>${t}</span>`).join('');

      const svcList = document.getElementById('services-list');
      const hasPending = (d.services || []).some(s => s.approval_status === 'PENDENTE');

      svcList.innerHTML = (d.services || []).map(s => {
        const isPending = s.approval_status === 'PENDENTE';
        const statusColor = s.approval_status === 'APROVADO' ? 'text-green-600' : s.approval_status === 'REPROVADO' ? 'text-red-600' : 'text-gray-600';
        const statusLabel = s.approval_status === 'APROVADO' ? 'Aprovado' : s.approval_status === 'REPROVADO' ? 'Reprovado' : 'Pendente';

        return `
          <div class="border border-gray-200 rounded-lg p-4">
            <div class="flex items-center justify-between">
              <div>
                <span class="font-medium">${s.title}</span>
                <span class="ml-2 text-sm ${statusColor} font-medium">${statusLabel}</span>
              </div>
              ${isPending ? `
                <div class="flex items-center gap-2">
                  <button onclick="approveService('${s.title}')" class="bg-green-100 hover:bg-green-200 text-green-700 px-3 py-1 rounded text-xs font-medium">Aprovar</button>
                  <button onclick="rejectService('${s.title}')" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded text-xs font-medium">Reprovar</button>
                </div>` : ''}
            </div>
          </div>`;
      }).join('');

      const bulkEl = document.getElementById('bulk-actions');
      if (hasPending) { bulkEl.classList.remove('hidden'); } else { bulkEl.classList.add('hidden'); }

      if (d.status === 'CANCELADA') {
        showStatusMsg('Esta OS foi cancelada.', 'bg-red-50 text-red-700');
      } else if (d.status === 'APROVADO' || d.status === 'EM_EXECUCAO' || d.status === 'FINALIZADA' || d.status === 'ENTREGUE') {
        showStatusMsg('Orcamento ja foi avaliado. Obrigado!', 'bg-green-50 text-green-700');
      }
    }

    function showStatusMsg(msg, cls) {
      const el = document.getElementById('status-message');
      el.textContent = msg;
      el.className = `mt-6 text-center p-4 rounded-lg text-sm font-medium ${cls}`;
      el.classList.remove('hidden');
    }

    // For the public approval, we need to use the approval endpoints.
    // The public work-order endpoint returns service titles but not IDs.
    // We need to use work order ID. Let's get it from the URL code.
    // Actually the approve-all/reject-all endpoints need the work order ID.
    // Since the public endpoint doesn't return it, we'll use the code to fetch
    // and handle approvals via the work-order-level endpoints.

    // The email links use full paths like /public/approvals/work-orders/{id}/approve-all
    // For the UI, we need the WO ID. Let's extract it from the lookup code parameter
    // or use a workaround: the lookup result has a code, we can add an approach
    // where the user gets linked with the ID pre-filled.

    // Simple approach: when linked from OS detail page, the URL can include the WO ID
    const preWoId = params.get('woId') || '';

    async function approveAll() {
      if (!preWoId) { alert('Link de aprovacao invalido. Use o link enviado por email.'); return; }
      try {
        const resp = await fetch(`/public/approvals/work-orders/${preWoId}/approve-all`);
        if (!resp.ok) throw new Error('Erro ao aprovar');
        showStatusMsg('Todos os servicos foram aprovados!', 'bg-green-50 text-green-700');
        document.getElementById('bulk-actions').classList.add('hidden');
        lookupWO();
      } catch (e) { alert(e.message); }
    }

    async function rejectAll() {
      if (!preWoId) { alert('Link de aprovacao invalido. Use o link enviado por email.'); return; }
      try {
        const resp = await fetch(`/public/approvals/work-orders/${preWoId}/reject-all`);
        if (!resp.ok) throw new Error('Erro ao reprovar');
        showStatusMsg('Todos os servicos foram reprovados.', 'bg-red-50 text-red-700');
        document.getElementById('bulk-actions').classList.add('hidden');
        lookupWO();
      } catch (e) { alert(e.message); }
    }

    // Individual service approval needs the work_order_service ID.
    // Since public endpoint doesn't expose it, individual buttons are placeholder
    // for the demo — the actual email links have the correct IDs.
    async function approveService(title) {
      alert('Para aprovar servicos individualmente, use os links enviados no email de orcamento.\n\nServico: ' + title);
    }
    async function rejectService(title) {
      alert('Para reprovar servicos individualmente, use os links enviados no email de orcamento.\n\nServico: ' + title);
    }

    // Auto-lookup if params provided
    if (preCode && preDoc) lookupWO();

    document.getElementById('document').addEventListener('keydown', e => { if (e.key === 'Enter') lookupWO(); });
  </script>
</body>
</html>
