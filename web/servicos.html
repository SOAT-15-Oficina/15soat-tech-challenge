<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oficina - Serviços</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-gray-900 text-white flex-shrink-0 flex flex-col"></aside>
    <div class="flex-1 flex flex-col">
      <header id="header" class="bg-white shadow px-6 py-3 flex justify-between items-center"></header>
      <main class="flex-1 p-6">

        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-3">
            <input id="search" type="text" placeholder="Filtrar por título..." class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-64">
            <button onclick="loadServices()" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-lg text-sm">Buscar</button>
          </div>
          <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">Novo serviço</button>
        </div>

        <div class="bg-white rounded-xl shadow overflow-x-auto">
          <table class="w-full min-w-[820px] text-sm">
            <thead class="bg-gray-50 text-left text-gray-600">
              <tr>
                <th class="px-4 py-3 font-medium">Título</th>
                <th class="px-4 py-3 font-medium text-right">Preço</th>
                <th class="px-4 py-3 font-medium text-right">Tempo estimado</th>
                <th class="px-4 py-3 font-medium text-right">Tempo médio real</th>
                <th class="px-4 py-3 font-medium text-center">Ativo</th>
                <th class="px-4 py-3 font-medium text-right">Ações</th>
              </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
          </table>
          <div id="empty" class="hidden text-center py-8 text-gray-400 text-sm">Nenhum serviço encontrado</div>
        </div>

      </main>
    </div>
  </div>

  <script src="/web/shared/app.js"></script>
  <script>
    initLayout();
    setPageTitle('Serviços');

    let avgData = {};

    function formatMinutes(value) {
      const minutes = Number(value);
      if (!Number.isFinite(minutes)) return '—';
      return (Math.round(minutes * 100) / 100).toLocaleString('pt-BR', {
        minimumFractionDigits: minutes % 1 === 0 ? 0 : 2,
        maximumFractionDigits: 2,
      });
    }

    function formatDifferenceMinutes(value) {
      const diff = Number(value);
      if (!Number.isFinite(diff)) return '';
      if (diff === 0) return 'no tempo esperado';
      const amount = formatMinutes(Math.abs(diff));
      return diff > 0 ? `${amount} min a mais` : `${amount} min a menos`;
    }

    async function loadAvgTimes() {
      try {
        const resp = await api.get('/services/avg-execution-time');
        const data = await api.json(resp);
        (data.data || []).forEach(item => {
          avgData[item.service_id] = item;
        });
      } catch { /* ignore */ }
    }

    async function loadServices() {
      const title = document.getElementById('search').value.trim();
      const query = title ? `?title=${encodeURIComponent(title)}` : '';
      try {
        await loadAvgTimes();
        const resp = await api.get('/services' + query);
        const data = await api.json(resp);
        const list = data.data || [];
        const tbody = document.getElementById('table-body');
        const empty = document.getElementById('empty');
        if (list.length === 0) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden');
        tbody.innerHTML = list.map(s => {
          const avg = avgData[s.id];
          let avgCell = '<span class="text-gray-400">—</span>';
          if (avg && avg.execution_count > 0) {
            const diff = Number(avg.difference_minutes ?? (avg.avg_real_time_minutes - avg.estimated_time_minutes));
            const diffColor = diff > 0 ? 'text-red-600' : diff < 0 ? 'text-green-600' : 'text-gray-600';
            const diffLabel = formatDifferenceMinutes(diff);
            avgCell = `
              <span class="font-medium">${formatMinutes(avg.avg_real_time_minutes)} min</span>
              <span class="text-xs ${diffColor} ml-1">(${diffLabel})</span>
              <span class="text-xs text-gray-400 ml-1">${avg.execution_count}x</span>`;
          }
          return `
            <tr class="hover:bg-gray-50">
              <td class="px-4 py-3 align-middle font-medium">${s.title}</td>
              <td class="px-4 py-3 align-middle text-right">${formatCents(s.price_cents)}</td>
              <td class="px-4 py-3 align-middle text-right">${formatMinutes(s.estimated_time_minutes)} min</td>
              <td class="px-4 py-3 align-middle text-right">${avgCell}</td>
              <td class="px-4 py-3 align-middle text-center">
                <span class="inline-block px-2 py-0.5 text-xs rounded-full ${s.active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">${s.active ? 'Sim' : 'Não'}</span>
              </td>
              <td class="px-4 py-3 align-middle text-right">
                <div class="flex justify-end gap-2">
                  <button onclick="openEditModal('${s.id}', ${JSON.stringify(s).replace(/"/g, '&quot;')})" class="bg-gray-200 hover:bg-gray-300 px-3 py-1.5 rounded-lg text-xs font-medium">Editar</button>
                  <button onclick="deleteService('${s.id}')" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-lg text-xs font-medium">Excluir</button>
                </div>
              </td>
            </tr>`;
        }).join('');
      } catch (e) { showError(e.message); }
    }

    function serviceFormHtml(data, action) {
      const d = data || {};
      return `
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
            <input id="m-title" type="text" value="${d.title || ''}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
            <textarea id="m-desc" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" rows="2">${d.description || ''}</textarea>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Preço (centavos)</label>
              <input id="m-price" type="number" value="${d.price_cents || ''}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Tempo estimado (min)</label>
              <input id="m-time" type="number" value="${d.estimated_time_minutes || ''}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <button onclick="${action}" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm">Salvar</button>
        </div>`;
    }

    function openCreateModal() {
      openModal('Novo serviço', serviceFormHtml(null, 'createService()'));
    }

    function openEditModal(id, data) {
      openModal('Editar serviço', serviceFormHtml(data, `updateService('${id}')`));
    }

    async function createService() {
      try {
        const body = {
          title: document.getElementById('m-title').value,
          description: document.getElementById('m-desc').value,
          price_cents: parseInt(document.getElementById('m-price').value),
          estimated_time_minutes: parseInt(document.getElementById('m-time').value),
        };
        const resp = await api.post('/services', body);
        await api.json(resp);
        closeModal(); showToast('Serviço criado'); loadServices();
      } catch (e) { showError(e.message); }
    }

    async function updateService(id) {
      try {
        const body = {
          title: document.getElementById('m-title').value,
          description: document.getElementById('m-desc').value,
          price_cents: parseInt(document.getElementById('m-price').value),
          estimated_time_minutes: parseInt(document.getElementById('m-time').value),
        };
        const resp = await api.put('/services/' + id, body);
        await api.json(resp);
        closeModal(); showToast('Serviço atualizado'); loadServices();
      } catch (e) { showError(e.message); }
    }

    async function deleteService(id) {
      if (!confirm('Tem certeza de que deseja excluir este serviço?')) return;
      try {
        const resp = await api.del('/services/' + id);
        await api.ensureOk(resp);
        const data = resp.status === 204 ? null : await resp.json().catch(() => null);
        showToast(data?.message || 'Serviço excluído');
        loadServices();
      } catch (e) { showError(e.message); }
    }

    document.getElementById('search').addEventListener('keydown', e => { if (e.key === 'Enter') loadServices(); });
    loadServices();
  </script>
</body>
</html>
