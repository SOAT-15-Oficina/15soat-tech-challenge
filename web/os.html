<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oficina - Detalhe OS</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-gray-900 text-white flex-shrink-0 flex flex-col"></aside>
    <div class="flex-1 flex flex-col">
      <header id="header" class="bg-white shadow px-6 py-3 flex justify-between items-center"></header>
      <main class="flex-1 p-6">
        <div id="content">
          <div class="text-center py-12 text-gray-400">Carregando...</div>
        </div>
      </main>
    </div>
  </div>

  <script src="/web/shared/app.js"></script>
  <script>
    initLayout();

    const woId = new URLSearchParams(window.location.search).get('id');
    if (!woId) { window.location.href = '/web/board.html'; }

    let currentWO = null;

    async function loadWO() {
      try {
        const resp = await api.get('/work-orders/' + woId);
        currentWO = await api.json(resp);
        render();
      } catch (e) { showError(e.message); }
    }

    function render() {
      const wo = currentWO;
      setPageTitle('OS ' + wo.code);

      const action = STATUS_ACTIONS[wo.status];
      const actionBtn = action
        ? `<button onclick="transitionStatus('${action.next}')" class="${action.cls} text-white px-4 py-2 rounded-lg text-sm font-medium">${action.label}</button>`
        : '';

      const canAddServices = wo.status === 'RECEBIDA' || wo.status === 'EM_DIAGNOSTICO';

      const publicUrl = `${window.location.origin}/web/aprovacao.html?code=${wo.code}&document=${wo.customer?.document || ''}&woId=${wo.id}`;

      document.getElementById('content').innerHTML = `
        <!-- Header -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
          <div class="flex items-start justify-between">
            <div>
              <div class="flex items-center gap-3 mb-2">
                <h2 class="text-xl font-bold">${wo.code}</h2>
                ${statusBadge(wo.status)}
              </div>
              <p class="text-gray-700 font-medium">${wo.title}</p>
              ${wo.description ? `<p class="text-gray-500 text-sm mt-1">${wo.description}</p>` : ''}
            </div>
            <div class="flex items-center gap-2">
              ${actionBtn}
              <a href="/web/board.html" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg text-sm">Voltar</a>
            </div>
          </div>

          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-5 pt-5 border-t text-sm">
            <div>
              <span class="text-gray-500">Cliente</span>
              <p class="font-medium">${wo.customer?.name || '—'}</p>
              <p class="text-xs text-gray-400">${wo.customer?.document || ''}</p>
            </div>
            <div>
              <span class="text-gray-500">Veiculo</span>
              <p class="font-medium">${wo.vehicle ? wo.vehicle.brand + ' ' + wo.vehicle.model : '—'}</p>
              <p class="text-xs text-gray-400">${wo.vehicle?.license_plate || ''}</p>
            </div>
            <div>
              <span class="text-gray-500">Total Estimado</span>
              <p class="font-medium">${formatCents(wo.total_estimated_price_cents)}</p>
            </div>
            <div>
              <span class="text-gray-500">Recebida em</span>
              <p class="font-medium">${formatDate(wo.received_at)}</p>
            </div>
          </div>

          <!-- Timestamps -->
          <div class="flex flex-wrap gap-4 mt-4 text-xs text-gray-500">
            ${wo.quote_sent_at ? `<span>Orcamento: ${formatDate(wo.quote_sent_at)}</span>` : ''}
            ${wo.approved_at ? `<span>Aprovada: ${formatDate(wo.approved_at)}</span>` : ''}
            ${wo.started_at ? `<span>Iniciada: ${formatDate(wo.started_at)}</span>` : ''}
            ${wo.finished_at ? `<span>Finalizada: ${formatDate(wo.finished_at)}</span>` : ''}
            ${wo.delivered_at ? `<span>Entregue: ${formatDate(wo.delivered_at)}</span>` : ''}
          </div>

          ${wo.status === 'AGUARDANDO_APROVACAO' ? `
          <div class="mt-4 p-3 bg-blue-50 rounded-lg text-sm">
            <span class="text-blue-700 font-medium">Link publico para o cliente:</span>
            <a href="${publicUrl}" target="_blank" class="text-blue-600 hover:underline break-all ml-1">${publicUrl}</a>
          </div>` : ''}
        </div>

        <!-- Services -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold">Servicos</h3>
            ${canAddServices ? `<button onclick="openAddServiceModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm">Adicionar Servico</button>` : ''}
          </div>
          <div id="services-list" class="space-y-3">
            ${renderServices(wo.services || [])}
          </div>
          ${(wo.services || []).length === 0 ? '<p class="text-gray-400 text-sm">Nenhum servico adicionado</p>' : ''}
        </div>
      `;
    }

    function renderServices(services) {
      return services.map(s => {
        const canAddSupply = currentWO.status === 'RECEBIDA' || currentWO.status === 'EM_DIAGNOSTICO';
        const canRemove = currentWO.status !== 'FINALIZADA' && currentWO.status !== 'ENTREGUE' && currentWO.status !== 'CANCELADA';
        return `
          <div class="border border-gray-200 rounded-lg p-4">
            <div class="flex items-center justify-between">
              <div>
                <span class="font-medium">${s.description || s.service_title_snapshot || '—'}</span>
                <span class="ml-2 text-gray-500 text-sm">${formatCents(s.service_price_cents_snapshot)}</span>
                <span class="ml-2 inline-block px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-600">${s.approval_status}</span>
                <span class="ml-1 inline-block px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-600">${s.status}</span>
              </div>
              <div class="flex items-center gap-2">
                ${canAddSupply ? `<button onclick="openAddSupplyModal('${s.id}')" class="text-blue-600 hover:underline text-xs">+ Insumo</button>` : ''}
                ${canRemove ? `<button onclick="removeService('${s.id}')" class="text-red-500 hover:underline text-xs">Remover</button>` : ''}
              </div>
            </div>
            ${(s.supplies || []).length > 0 ? `
              <div class="mt-2 ml-4 space-y-1">
                ${s.supplies.map(sup => `
                  <div class="flex items-center justify-between text-sm text-gray-600">
                    <span>${sup.description || sup.supply_title_snapshot || '—'} x${sup.supply_quantity}</span>
                    <div class="flex items-center gap-2">
                      <span>${formatCents(sup.supply_price_cents_snapshot * sup.supply_quantity)}</span>
                      ${canRemove ? `<button onclick="removeSupply('${s.id}','${sup.id}')" class="text-red-400 hover:text-red-600 text-xs">x</button>` : ''}
                    </div>
                  </div>`).join('')}
              </div>` : ''}
          </div>`;
      }).join('');
    }

    async function transitionStatus(newStatus) {
      try {
        const resp = await api.put('/work-orders/' + woId, { status: newStatus });
        await api.json(resp);
        showToast('Status atualizado');
        loadWO();
      } catch (e) { showError(e.message); }
    }

    async function openAddServiceModal() {
      try {
        const resp = await api.get('/services?active=true&limit=100');
        const data = await api.json(resp);
        const list = data.data || [];
        const opts = list.map(s =>
          `<option value="${s.id}">${s.title} — ${formatCents(s.price_cents)} (${s.estimated_time_minutes} min)</option>`
        ).join('');
        openModal('Adicionar Servico', `
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Servico</label>
              <select id="m-service" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                <option value="">Selecione...</option>${opts}
              </select>
            </div>
            <button onclick="addService()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm">Adicionar</button>
          </div>`);
      } catch (e) { showError(e.message); }
    }

    async function addService() {
      const serviceId = document.getElementById('m-service').value;
      if (!serviceId) { showError('Selecione um servico'); return; }
      try {
        const resp = await api.post(`/work-orders/${woId}/services`, [{ service_id: serviceId }]);
        await api.json(resp);
        closeModal(); showToast('Servico adicionado'); loadWO();
      } catch (e) { showError(e.message); }
    }

    async function removeService(wosId) {
      if (!confirm('Remover este servico?')) return;
      try {
        const resp = await api.del(`/work-orders/${woId}/services/${wosId}`);
        if (!resp.ok && resp.status !== 204) { const e = await resp.json(); throw new Error(e.error); }
        showToast('Servico removido'); loadWO();
      } catch (e) { showError(e.message); }
    }

    async function openAddSupplyModal(wosId) {
      try {
        const resp = await api.get('/supplies');
        const data = await api.json(resp);
        const list = data.data || [];
        const opts = list.map(s =>
          `<option value="${s.id}">${s.title} — ${formatCents(s.price_cents)} (estoque: ${s.stock_quantity})</option>`
        ).join('');
        openModal('Adicionar Insumo', `
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Insumo</label>
              <select id="m-supply" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                <option value="">Selecione...</option>${opts}
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Quantidade</label>
              <input id="m-qty" type="number" value="1" min="1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <button onclick="addSupply('${wosId}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm">Adicionar</button>
          </div>`);
      } catch (e) { showError(e.message); }
    }

    async function addSupply(wosId) {
      const supplyId = document.getElementById('m-supply').value;
      const qty = parseInt(document.getElementById('m-qty').value);
      if (!supplyId || !qty) { showError('Selecione insumo e quantidade'); return; }
      try {
        const resp = await api.post(`/work-orders/${woId}/services/${wosId}/supplies`, [{ supply_id: supplyId, quantity: qty }]);
        await api.json(resp);
        closeModal(); showToast('Insumo adicionado'); loadWO();
      } catch (e) { showError(e.message); }
    }

    async function removeSupply(wosId, supplyId) {
      try {
        const resp = await api.del(`/work-orders/${woId}/services/${wosId}/supplies/${supplyId}`);
        if (!resp.ok && resp.status !== 204) { const e = await resp.json(); throw new Error(e.error); }
        showToast('Insumo removido'); loadWO();
      } catch (e) { showError(e.message); }
    }

    loadWO();
  </script>
</body>
</html>
