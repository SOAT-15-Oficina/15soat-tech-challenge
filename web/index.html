<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oficina - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-xl shadow-lg w-full max-w-sm p-8">
    <h1 class="text-2xl font-bold text-center mb-2">Oficina</h1>
    <p class="text-gray-500 text-center text-sm mb-6">Sistema de Gestao</p>

    <div id="login-form">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
          <input id="username" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="usuario">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input id="password" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="senha">
        </div>
        <div id="error" class="text-red-600 text-sm hidden"></div>
        <button onclick="doLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm">
          Entrar
        </button>
      </div>
      <div class="mt-4 text-center">
        <button onclick="showRegister()" class="text-sm text-blue-600 hover:underline">Criar conta</button>
      </div>
    </div>

    <div id="register-form" class="hidden">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
          <input id="reg-username" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input id="reg-password" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
          <select id="reg-role" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            <option value="employee">Employee</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="reg-error" class="text-red-600 text-sm hidden"></div>
        <button onclick="doRegister()" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 rounded-lg text-sm">
          Registrar
        </button>
      </div>
      <div class="mt-4 text-center">
        <button onclick="showLogin()" class="text-sm text-blue-600 hover:underline">Voltar ao login</button>
      </div>
    </div>
  </div>

  <script src="/web/shared/app.js"></script>
  <script>
    // If already logged in, redirect
    if (api.getToken()) window.location.href = '/web/board.html';

    function showRegister() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('register-form').classList.remove('hidden');
    }
    function showLogin() {
      document.getElementById('register-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
    }

    async function doLogin() {
      const errEl = document.getElementById('error');
      errEl.classList.add('hidden');
      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Erro ao fazer login');
        api.setToken(data.token);
        window.location.href = '/web/board.html';
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }

    async function doRegister() {
      const errEl = document.getElementById('reg-error');
      errEl.classList.add('hidden');
      try {
        const resp = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('reg-username').value,
            password: document.getElementById('reg-password').value,
            role: document.getElementById('reg-role').value
          })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Erro ao registrar');
        showLogin();
        document.getElementById('username').value = document.getElementById('reg-username').value;
        document.getElementById('error').textContent = 'Conta criada! Faca login.';
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error').classList.replace('text-red-600', 'text-green-600');
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }

    // Enter key support
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('reg-password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
