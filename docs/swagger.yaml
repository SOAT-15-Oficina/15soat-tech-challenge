openapi: 3.0.3
info:
  title: Tech Challenge - Oficina Mecanica API
  description: API para gerenciamento de oficina mecanica com controle de ordens de servico, estoque e clientes.
  version: 2.0.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Health check
  - name: Auth
    description: Autenticacao e registro de usuarios
  - name: Users
    description: Gerenciamento de usuarios (admin only)
  - name: Customers
    description: Gerenciamento de clientes
  - name: Vehicles
    description: Gerenciamento de veiculos
  - name: Supplies
    description: Gerenciamento de pecas e insumos
  - name: Services
    description: Catalogo de servicos da oficina
  - name: Work Orders
    description: Ordens de servico
  - name: Public
    description: Endpoints publicos (sem autenticacao)
  - name: Reports
    description: Relatorios de gestao administrativa

security:
  - BearerAuth: []

paths:
  /ping:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: API is running
          content:
            text/plain:
              schema:
                type: string
                example: Pong

  # ── Auth ──────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar novo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuario criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login e obtencao de token JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Credenciais invalidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Users ─────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      summary: Listar todos os usuarios
      description: Requer role admin.
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Users]
      summary: Buscar usuario por ID
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Users]
      summary: Atualizar usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Usuario atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Users]
      summary: Deletar usuario
      responses:
        "204":
          description: Usuario deletado
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Customers ─────────────────────────────────────────
  /customers:
    post:
      tags: [Customers]
      summary: Criar cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRequest"
      responses:
        "201":
          description: Cliente criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Customers]
      summary: Listar todos os clientes
      responses:
        "200":
          description: Lista de clientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Customer"

  /customers/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Customers]
      summary: Buscar cliente por ID
      responses:
        "200":
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Customers]
      summary: Atualizar cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRequest"
      responses:
        "200":
          description: Cliente atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Customers]
      summary: Deletar cliente
      responses:
        "204":
          description: Cliente deletado
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Vehicles ──────────────────────────────────────────
  /vehicles:
    post:
      tags: [Vehicles]
      summary: Criar veiculo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleRequest"
      responses:
        "201":
          description: Veiculo criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Vehicles]
      summary: Listar todos os veiculos
      responses:
        "200":
          description: Lista de veiculos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Vehicles]
      summary: Buscar veiculo por ID
      responses:
        "200":
          description: Veiculo encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Vehicles]
      summary: Atualizar veiculo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleRequest"
      responses:
        "200":
          description: Veiculo atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Vehicles]
      summary: Deletar veiculo
      responses:
        "204":
          description: Veiculo deletado
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Supplies ──────────────────────────────────────────
  /supplies/pending-purchases:
    get:
      tags: [Supplies]
      summary: Listar compras pendentes (insumos em falta para servicos aprovados)
      description: Retorna todos os servicos aprovados que possuem insumos com quantidade necessaria maior que o estoque disponivel.
      responses:
        "200":
          description: Lista de alertas de compra
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        WorkOrderCode:
                          type: string
                          example: "OS-20260507-0001"
                        WorkOrderTitle:
                          type: string
                          example: "Revisao Corolla"
                        ServiceTitle:
                          type: string
                          example: "Troca de Oleo"
                        SupplyTitle:
                          type: string
                          example: "Oleo Motor 5W30"
                        SupplyID:
                          type: string
                          format: uuid
                        Required:
                          type: integer
                          example: 1000
                        InStock:
                          type: integer
                          example: 10

  /supplies:
    post:
      tags: [Supplies]
      summary: Criar insumo/peca
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplyRequest"
      responses:
        "201":
          description: Insumo criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supply"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Supplies]
      summary: Listar todos os insumos
      responses:
        "200":
          description: Lista de insumos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Supply"

  /supplies/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Supplies]
      summary: Buscar insumo por ID
      responses:
        "200":
          description: Insumo encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supply"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Supplies]
      summary: Atualizar insumo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplyRequest"
      responses:
        "200":
          description: Insumo atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supply"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Supplies]
      summary: Deletar insumo
      responses:
        "204":
          description: Insumo deletado
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Services ──────────────────────────────────────────
  /services:
    post:
      tags: [Services]
      summary: Criar servico da oficina
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkshopServiceCreateRequest"
      responses:
        "201":
          description: Servico criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopServiceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Services]
      summary: Listar servicos da oficina
      parameters:
        - name: title
          in: query
          description: Busca parcial por titulo (case insensitive)
          schema:
            type: string
        - name: active
          in: query
          description: Filtrar por status ativo
          schema:
            type: boolean
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Lista paginada de servicos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopServiceListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /services/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Services]
      summary: Buscar servico por ID
      responses:
        "200":
          description: Servico encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopServiceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Services]
      summary: Atualizar servico (parcial)
      description: Apenas os campos fornecidos sao alterados.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkshopServiceUpdateRequest"
      responses:
        "200":
          description: Servico atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopServiceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Services]
      summary: Deletar ou desativar servico
      description: |
        Hard delete se nao ha vinculos com OS.
        Se ha vinculos, desativa (soft delete) e retorna 200.
      responses:
        "204":
          description: Servico deletado (hard delete)
        "200":
          description: Servico desativado (soft delete)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: service has existing work order links and was deactivated
                  service:
                    $ref: "#/components/schemas/WorkshopServiceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /services/avg-execution-time:
    get:
      tags: [Reports]
      summary: Tempo medio de execucao por servico
      description: |
        Retorna o tempo medio real de execucao para cada tipo de servico,
        calculado a partir de servicos finalizados em ordens de servico.
      parameters:
        - name: from
          in: query
          description: Data inicio (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: to
          in: query
          description: Data fim (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-12-31"
        - name: technicianId
          in: query
          description: Filtrar por tecnico (UUID)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista com tempos medios
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AvgExecutionTimeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Work Orders ───────────────────────────────────────
  /work-orders:
    post:
      tags: [Work Orders]
      summary: Criar ordem de servico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderCreateRequest"
      responses:
        "201":
          description: OS criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Work Orders]
      summary: Listar ordens de servico
      description: |
        Lista paginada de OS. Regras de exclusao e ordenacao (Fase 2):
        - OS com status FINALIZADA, ENTREGUE ou CANCELADA sao excluidas da listagem padrao (exclusao logica).
        - Ordenacao por prioridade de status: EM_EXECUCAO > APROVADO > AGUARDANDO_APROVACAO > EM_DIAGNOSTICO > RECEBIDA.
        - Dentro do mesmo status, mais antigas primeiro (received_at ASC).
        - Quando o filtro `status` e informado, a exclusao logica nao se aplica (o filtro explicito prevalece).
      parameters:
        - name: status
          in: query
          description: "Filtrar por status. Quando informado, a exclusao logica de FINALIZADA/ENTREGUE/CANCELADA nao se aplica."
          schema:
            $ref: "#/components/schemas/WorkOrderStatus"
        - name: customerId
          in: query
          description: Filtrar por cliente (UUID)
          schema:
            type: string
            format: uuid
        - name: vehicleId
          in: query
          description: Filtrar por veiculo (UUID)
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          description: Data inicio (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: Data fim (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Lista paginada de OS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderListResponse"
        "401":
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /work-orders/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Work Orders]
      summary: Buscar OS por ID
      responses:
        "200":
          description: OS encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Work Orders]
      summary: Atualizar OS (campos e/ou status)
      description: |
        Se o campo `status` for enviado, a transicao de status e processada via maquina de estados.
        Ao transitar para AGUARDANDO_APROVACAO, o orcamento e enviado por e-mail.
        Na geracao do orcamento, quando houver insumo com quantidade necessaria maior que o estoque,
        o prazo estimado do servico no orcamento recebe acrescimo padrao de 2 dias.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderUpdateRequest"
      responses:
        "200":
          description: OS atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Transicao de status invalida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /work-orders/{id}/services:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      tags: [Work Orders]
      summary: Adicionar servicos a uma OS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/AddServiceRequest"
      responses:
        "201":
          description: Servicos adicionados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Status da OS nao permite adicionar servicos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /work-orders/{id}/services/{wosId}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - name: wosId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: ID do servico na OS (work_order_service)
    delete:
      tags: [Work Orders]
      summary: Remover servico de uma OS
      responses:
        "204":
          description: Servico removido
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Status da OS nao permite remocao
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /work-orders/{id}/services/{wosId}/start:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - name: wosId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [Work Orders]
      summary: Iniciar execucao de um servico individual
      description: |
        Transiciona o servico de PENDENTE para EM_EXECUCAO.
        Requer que a OS esteja em EM_EXECUCAO e que o servico esteja aprovado.
        Bloqueia se os insumos vinculados excedem o estoque disponivel.
      responses:
        "200":
          description: Servico iniciado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Servico iniciado com sucesso"
        "422":
          description: Estoque insuficiente, status invalido ou servico nao pertence a OS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /work-orders/{id}/services/{wosId}/finalize:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - name: wosId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [Work Orders]
      summary: Finalizar um servico individual
      description: |
        Transiciona o servico de EM_EXECUCAO para FINALIZADO.
        Da baixa no estoque dos insumos vinculados.
        Se todos os servicos aprovados estiverem finalizados, a OS auto-transiciona para FINALIZADA.
      responses:
        "200":
          description: Servico finalizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Servico finalizado com sucesso"
        "422":
          description: Status invalido ou servico nao pertence a OS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /work-orders/{id}/services/{wosId}/supplies:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - name: wosId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: ID do servico na OS
    post:
      tags: [Work Orders]
      summary: Adicionar insumos a um servico da OS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/AddSupplyRequest"
      responses:
        "201":
          description: Insumos adicionados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderService"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Servico nao pertence a esta OS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /work-orders/{id}/services/{wosId}/supplies/{supplyId}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - name: wosId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: supplyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Work Orders]
      summary: Remover insumo de um servico da OS
      responses:
        "204":
          description: Insumo removido
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Status nao permite remocao
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Public ────────────────────────────────────────────
  /public/work-orders/{code}:
    parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
        description: Codigo da OS
    get:
      tags: [Public]
      summary: Consultar status da OS (publico)
      security: []
      description: |
        Permite ao cliente consultar o status atual da OS informando o codigo e seu documento (CPF/CNPJ).
        Status possiveis: RECEBIDA, EM_DIAGNOSTICO, AGUARDANDO_APROVACAO, APROVADO, EM_EXECUCAO, FINALIZADA, ENTREGUE, CANCELADA.
      parameters:
        - name: document
          in: query
          required: true
          description: Documento do cliente (CPF ou CNPJ)
          schema:
            type: string
            example: "12345678901"
      responses:
        "200":
          description: Status publico da OS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicWorkOrderView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /public/approvals/services/{workOrderServiceId}/approve:
    parameters:
      - name: workOrderServiceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Public]
      summary: Aprovar um servico da OS
      security: []
      description: |
        Endpoint chamado pelo cliente (via link no e-mail de orcamento) para aprovar um servico especifico.
        Quando todos os servicos sao aprovados, a OS transita para APROVADO.
      responses:
        "200":
          description: Servico aprovado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /public/approvals/services/{workOrderServiceId}/reject:
    parameters:
      - name: workOrderServiceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Public]
      summary: Reprovar um servico da OS
      security: []
      description: |
        Endpoint chamado pelo cliente (via link no e-mail de orcamento) para recusar um servico especifico.
        Quando todos os servicos sao reprovados, a OS transita para CANCELADA.
      responses:
        "200":
          description: Servico reprovado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /public/approvals/work-orders/{workOrderId}/approve-all:
    parameters:
      - name: workOrderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Public]
      summary: Aprovar todos os servicos de uma OS
      security: []
      description: |
        Endpoint chamado pelo cliente (via link no e-mail de orcamento) para aprovar todos os servicos de uma vez.
        A OS transita para APROVADO.
      responses:
        "200":
          description: Todos aprovados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /public/approvals/work-orders/{workOrderId}/reject-all:
    parameters:
      - name: workOrderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Public]
      summary: Reprovar todos os servicos de uma OS
      security: []
      description: |
        Endpoint chamado pelo cliente (via link no e-mail de orcamento) para recusar todos os servicos de uma vez.
        A OS transita para CANCELADA.
      responses:
        "200":
          description: Todos reprovados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      description: Numero da pagina (default 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Itens por pagina (default 10)
      schema:
        type: integer
        minimum: 1
        default: 10

  responses:
    BadRequest:
      description: Requisicao invalida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "invalid id"
    NotFound:
      description: Recurso nao encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "resource not found"
    Conflict:
      description: "Conflito (ex: titulo duplicado)"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "service title already exists"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    WorkOrderStatus:
      type: string
      enum:
        [
          RECEBIDA,
          EM_DIAGNOSTICO,
          AGUARDANDO_APROVACAO,
          APROVADO,
          EM_EXECUCAO,
          FINALIZADA,
          ENTREGUE,
          CANCELADA,
        ]

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    # ── Auth ──────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
          example: joao
        password:
          type: string
          example: senha123
        role:
          type: string
          enum: [admin, employee]
          example: admin

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: joao
        password:
          type: string
          example: senha123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          type: string
          enum: [admin, employee]

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
          enum: [admin, employee]

    # ── Customer ──────────────────────────────────────
    CustomerRequest:
      type: object
      required: [name, email, document, document_type]
      properties:
        name:
          type: string
          example: Roberto Silva
        email:
          type: string
          format: email
          example: roberto@email.com
        document:
          type: string
          example: "12345678901"
        document_type:
          type: string
          enum: [CPF, CNPJ]
          example: CPF

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        document:
          type: string
        document_type:
          type: string
          enum: [CPF, CNPJ]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Vehicle ───────────────────────────────────────
    VehicleRequest:
      type: object
      required: [license_plate, customer_id, model, year, brand]
      properties:
        license_plate:
          type: string
          example: ABC1D23
        customer_id:
          type: string
          format: uuid
        model:
          type: string
          example: Corolla
        year:
          type: integer
          example: 2022
        brand:
          type: string
          example: Toyota

    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        license_plate:
          type: string
        customer_id:
          type: string
          format: uuid
        model:
          type: string
        year:
          type: integer
        brand:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Supply ────────────────────────────────────────
    SupplyRequest:
      type: object
      required: [title, type, price_cents, stock_quantity, minimum_stock]
      properties:
        title:
          type: string
          example: Oleo Motor 5W30
        type:
          type: string
          enum: [PECA, INSUMO]
          example: PECA
        price_cents:
          type: integer
          example: 5000
          description: Preco em centavos
        stock_quantity:
          type: integer
          example: 100
        minimum_stock:
          type: integer
          example: 10
        active:
          type: boolean
          default: true

    Supply:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        type:
          type: string
        price_cents:
          type: integer
        stock_quantity:
          type: integer
        minimum_stock:
          type: integer
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Workshop Service ──────────────────────────────
    WorkshopServiceCreateRequest:
      type: object
      required: [title, price_cents, estimated_time_minutes]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 150
          example: Troca de Oleo
        description:
          type: string
          maxLength: 500
          example: Troca completa de oleo do motor com filtro
        price_cents:
          type: integer
          minimum: 1
          description: Preco em centavos (ex. 5000 = R$50.00)
          example: 5000
        estimated_time_minutes:
          type: integer
          minimum: 1
          example: 30

    WorkshopServiceUpdateRequest:
      type: object
      description: Pelo menos um campo deve ser fornecido.
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 150
        description:
          type: string
          maxLength: 500
        price_cents:
          type: integer
          minimum: 1
        estimated_time_minutes:
          type: integer
          minimum: 1
        active:
          type: boolean

    WorkshopServiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        price_cents:
          type: integer
        estimated_time_minutes:
          type: integer
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkshopServiceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WorkshopServiceResponse"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    AvgExecutionTimeResponse:
      type: object
      properties:
        service_id:
          type: string
          format: uuid
        title:
          type: string
          example: Troca de Oleo
        estimated_time_minutes:
          type: integer
          example: 30
        avg_real_time_minutes:
          type: number
          format: double
          example: 25.5
        execution_count:
          type: integer
          example: 3
        difference_minutes:
          type: number
          format: double
          example: -4.5

    # ── Work Order ────────────────────────────────────
    WorkOrderCreateRequest:
      type: object
      description: |
        Abertura de OS. O campo opened_by_user_id e preenchido automaticamente a partir do token JWT.
        Servicos e pecas sao adicionados apos a abertura via endpoints /work-orders/{id}/services e /work-orders/{id}/services/{wosId}/supplies.
      required: [title, customer_id, vehicle_id]
      properties:
        title:
          type: string
          example: Revisao completa
        description:
          type: string
          example: Cliente relatou barulho no motor
        customer_id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        assigned_technician_id:
          type: string
          format: uuid

    WorkOrderUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/WorkOrderStatus"
          description: Transiciona o status via maquina de estados
        assigned_technician_id:
          type: string
          format: uuid

    WorkOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: OS-20260505-001
        title:
          type: string
        description:
          type: string
          nullable: true
        opened_by_user_id:
          type: string
          format: uuid
        assigned_technician_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/WorkOrderStatus"
        total_estimated_price_cents:
          type: integer
        received_at:
          type: string
          format: date-time
        quote_sent_at:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        customer:
          $ref: "#/components/schemas/WorkOrderCustomer"
        vehicle:
          $ref: "#/components/schemas/WorkOrderVehicle"
        services:
          type: array
          items:
            $ref: "#/components/schemas/WorkOrderServiceWithSupplies"

    WorkOrderCustomer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        document:
          type: string

    WorkOrderVehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        license_plate:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer

    WorkOrderServiceWithSupplies:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        service_price_cents_snapshot:
          type: integer
        status:
          type: string
        approval_status:
          type: string
        quantity:
          type: integer
        supplies:
          type: array
          items:
            $ref: "#/components/schemas/WorkOrderServiceSupplyItem"

    WorkOrderServiceSupplyItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        supply_price_cents_snapshot:
          type: integer
        supply_quantity:
          type: integer

    WorkOrderService:
      type: object
      properties:
        id:
          type: string
          format: uuid
        work_order_id:
          type: string
          format: uuid
        service_id:
          type: string
          format: uuid
        service_title_snapshot:
          type: string
        service_description_snapshot:
          type: string
        service_price_cents_snapshot:
          type: integer
        service_estimated_time_minutes_snapshot:
          type: integer
          description: Tempo base estimado do servico em minutos (antes de eventuais acrescimos de prazo no orcamento).
        approval_status:
          type: string
          enum: [PENDENTE, APROVADO, REPROVADO]
        status:
          type: string
          enum: [PENDENTE, AGUARDANDO_APROVACAO, EM_EXECUCAO, FINALIZADO]
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkOrderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WorkOrder"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    AddServiceRequest:
      type: object
      required: [service_id]
      properties:
        service_id:
          type: string
          format: uuid
        estimated_time_minutes:
          type: integer
          description: Override do tempo estimado base em minutos (opcional).

    AddSupplyRequest:
      type: object
      required: [supply_id, quantity]
      properties:
        supply_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    # ── Public Views ──────────────────────────────────
    PublicWorkOrderView:
      type: object
      properties:
        code:
          type: string
        status:
          $ref: "#/components/schemas/WorkOrderStatus"
        total_estimated_price_cents:
          type: integer
        received_at:
          type: string
          format: date-time
        quote_sent_at:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
        services:
          type: array
          items:
            $ref: "#/components/schemas/PublicServiceView"

    PublicServiceView:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
        approval_status:
          type: string
